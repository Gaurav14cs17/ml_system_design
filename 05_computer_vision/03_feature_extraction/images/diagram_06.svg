┌───────────────────────────────────────────────────────────────────────────┐
│                           HOG COMPUTATION                                    │
└───────────────────────────────────────────────────────────────────────────┘

  Step 1: Compute Gradients      Step 2: Cell Histograms      Step 3: Block Norm

  ┌─────────────────┐           ┌─────────────────┐          ┌─────────────────┐
  │  → ↗ ↑ ↖ ←      │           │ ┌───┬───┬───┐   │          │ ┌───────┬───────┐
  │  ↗ ↑ ↖ ← ↙      │      →    │ │9  │9  │9  │   │     →    │ │ norm  │ norm  │
  │  ↑ ↖ ← ↙ ↓      │           │ │bin│bin│bin│   │          │ │ block │ block │
  │  ↖ ← ↙ ↓ ↘      │           │ └───┴───┴───┘   │          │ └───────┴───────┘
  └─────────────────┘           └─────────────────┘          └─────────────────┘

  Magnitude &amp; direction         9-bin histogram              L2 normalize over
  at each pixel                 per 8×8 cell                 2×2 cell blocks

  HOG Descriptor Structure:
  ─────────────────────────
  • Image: 64×128 pixels (typical for pedestrian detection)
  • Cells: 8×8 pixels each → 8×16 cells
  • Blocks: 2×2 cells with 50% overlap → 7×15 blocks
  • Histograms: 9 bins per cell
  • Final descriptor: 7 × 15 × 2 × 2 × 9 = 3780 dimensions
  </text>
