  Step 1: Scale-Space       Step 2: Keypoint         Step 3: Orientation
  Extrema Detection         Localization             Assignment

  ┌─────────────────┐      ┌─────────────────┐      ┌─────────────────┐
  │  ○   ○   ○      │      │       ●         │      │       ●→        │
