  <rect width='100%' height='100%' fill='#0f172a' stroke='#334155' />
  <text x='10' y='24' fill='#e2e8f0' xml:space='preserve'>
┌───────────────────────────────────────────────────────────────────────────┐
│                      STEREO VISION PRINCIPLE                                 │
└───────────────────────────────────────────────────────────────────────────┘

Left Camera                Right Camera
    │                          │
    │                          │
    │     ┌───────────────┐    │
    │     │    Object     │  │
    │     └───────────────┘    │
    │         │                │
    │         │                │
    ▼         ▼                ▼
  ┌───┐     ┌───┐            ┌───┐
  │ L │     │   │            │ R │
  └───┘     └───┘            └───┘
             ◀── Disparity ──▶

Depth = (focal_length × baseline) / disparity

• Larger disparity = closer object
• Smaller disparity = farther object
  </text>
