<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns='http://www.w3.org/2000/svg' width='660' height='740' viewBox='0 0 660 740'>
  <style>
    text {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      white-space: pre;
    }
  </style>
  <rect width='100%' height='100%' fill='#0f172a' stroke='#334155' />
  <text x='10' y='24' fill='#e2e8f0' xml:space='preserve'>
┌───────────────────────────────────────────────────────────────────────────┐
│                         GAN ARCHITECTURE                                     │
└───────────────────────────────────────────────────────────────────────────┘

                     ┌──────────────────────────────────────┐
                     │           Training Loop               │
                     └──────────────────────────────────────┘

    Noise z                                    Real Images
    ┌─────┐                                    ┌─────┐
    │~N(0,1)│                                   │ 🖼️  │
    └───┬───┘                                   └──┬──┘
        │                                          │
        ▼                                          │
  ┌───────────┐                                    │
  │ Generator │                                    │
  │    (G)    │                                    │
  └─────┬─────┘                                    │
        │                                          │
        ▼                                          │
   Fake Images                                     │
    ┌─────┐                                        │
    │ 🖼️  │                                        │
    └──┬──┘                                        │
       │                                           │
       └──────────────┐            ┌───────────────┘
                      │            │
                      ▼            ▼
                ┌─────────────────────┐
                │    Discriminator    │
                │        (D)          │
                └──────────┬──────────┘
                           │
                           ▼
                    Real or Fake?

Loss Functions:
─────────────────
D loss: max log(D(x)) + log(1 - D(G(z)))
G loss: min log(1 - D(G(z)))  or  max log(D(G(z)))
  </text>
</svg>
