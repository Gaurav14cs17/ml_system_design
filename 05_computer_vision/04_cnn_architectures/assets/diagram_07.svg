<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns='http://www.w3.org/2000/svg' width='660' height='794' viewBox='0 0 660 794'>
  <style>
    text {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      white-space: pre;
    }
  </style>
  <rect width='100%' height='100%' fill='#0f172a' stroke='#334155' />
  <text x='10' y='24' fill='#e2e8f0' xml:space='preserve'>
┌───────────────────────────────────────────────────────────────────────────┐
│                    VISION TRANSFORMER (ViT) ARCHITECTURE                     │
└───────────────────────────────────────────────────────────────────────────┘

Input Image: 224×224×3

Step 1: Patch Embedding
────────────────────────
Split into 16×16 patches: 14×14 = 196 patches
Each patch: 16×16×3 = 768 dimensions
Add [CLS] token: 197 tokens total

    ┌───┬───┬───┬───┐
    │ 1 │ 2 │ 3 │...│
    ├───┼───┼───┼───┤
    │ 5 │ 6 │ 7 │...│   ──▶  [CLS, P1, P2, P3, ... P196]
    ├───┼───┼───┼───┤              │
    │...│...│...│...│              ▼
    └───┴───┴───┴───┘         + Position Embeddings

Step 2: Transformer Encoder (×12 layers for ViT-B)
────────────────────────────────────────────────────

    ┌─────────────────────────────────────┐
    │                                     │
    │    Layer Norm                       │
    │         │                           │
    │    Multi-Head Self-Attention        │
    │         │                           │
    │         + ←───── (residual)         │
    │         │                           │
    │    Layer Norm                       │
    │         │                           │
    │    MLP (FFN)                        │
    │         │                           │
    │         + ←───── (residual)         │
    │                                     │
    └─────────────────────────────────────┘
              × 12 layers

Step 3: Classification Head
───────────────────────────
[CLS] token → Layer Norm → Linear → Classes
  </text>
</svg>
