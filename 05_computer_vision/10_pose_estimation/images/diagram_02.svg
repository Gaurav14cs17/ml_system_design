Single Hourglass (encoder-decoder with skip connections):

Input        Encoder              Decoder         Output
  │            │                     │              │
  ▼            ▼                     ▼              ▼
┌────┐      ┌────┐               ┌────┐          ┌────┐
│256 │──────│128 │───────────────│128 │──────────│Heatmaps
├────┤      ├────┤               ├────┤          │(K×H×W)
│    │──────│64  │───────────────│64  │──────────│
├────┤      ├────┤               ├────┤          │K = num
│    │──────│32  │               │32  │──────────│keypoints
└────┘      └────┘               └────┘          └────┘
              │                     ▲
              └──────►──────────────┘
               Bottleneck

Stacking: Chain multiple hourglasses for refinement
