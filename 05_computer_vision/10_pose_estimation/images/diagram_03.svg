  <rect width='100%' height='100%' fill='#0f172a' stroke='#334155' />
  <text x='10' y='24' fill='#e2e8f0' xml:space='preserve'>
┌───────────────────────────────────────────────────────────────────────────┐
│                    HRNET ARCHITECTURE                                        │
└───────────────────────────────────────────────────────────────────────────┘

Key Idea: Maintain high-resolution representations throughout

Traditional (lose resolution):
    High-res ──▶ Med-res ──▶ Low-res ──▶ Upsample ──▶ Output

HRNet (parallel multi-resolution):
    High-res ══════════════════════════════════════════▶ ─┐
              ╲                                           │
    Med-res   ════════════════════════════════════════▶ ─┼─▶ Output
              ╲    ╲                                      │
    Low-res   ════════════════════════════════════════▶ ─┘

Multi-scale fusion at each stage:
┌─────┐     ┌─────┐     ┌─────┐
│ HR  │◄───►│ HR  │◄───►│ HR  │
├─────┤     ├─────┤     ├─────┤
│ MR  │◄───►│ MR  │◄───►│ MR  │
├─────┤     ├─────┤     ├─────┤
│ LR  │◄───►│ LR  │◄───►│ LR  │
└─────┘     └─────┘     └─────┘
 Stage 1     Stage 2     Stage 3
  </text>
</svg>
