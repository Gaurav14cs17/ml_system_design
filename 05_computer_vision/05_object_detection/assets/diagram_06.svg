┌───────────────────────────────────────────────────────────────────────────┐
│                      YOLOv3/v4 ARCHITECTURE                                  │
└───────────────────────────────────────────────────────────────────────────┘

                         Input: 416×416×3
                              │
                              ▼
                    ┌─────────────────────┐
                    │    Darknet-53       │
                    │     Backbone        │
                    └──────────┬──────────┘
                               │
        ┌──────────────────────┼──────────────────────┐
        │                      │                      │
        ▼                      ▼                      ▼
   ┌─────────┐           ┌─────────┐           ┌─────────┐
   │ 52×52   │           │ 26×26   │           │ 13×13   │
   │ Scale 1 │           │ Scale 2 │           │ Scale 3 │
   │(small)  │           │(medium) │           │ (large) │
   └────┬────┘           └────┬────┘           └────┬────┘
        │                     │                     │
        ▼                     ▼                     ▼
   Detection            Detection              Detection
   Head                 Head                   Head
        │                     │                     │
        └─────────────────────┼─────────────────────┘
                              │
                              ▼
                         NMS + Output

Each detection predicts:
• tx, ty, tw, th (box coordinates)
• objectness score
• class probabilities

Grid cell prediction:
┌─────────────────────────────────────────┐
│ bx = σ(tx) + cx                         │
│ by = σ(ty) + cy                         │
│ bw = pw × e^tw                          │
│ bh = ph × e^th                          │
│                                         │
│ where (cx, cy) = grid cell offset       │
│       (pw, ph) = anchor prior           │
└─────────────────────────────────────────┘
  </text>
